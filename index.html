<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon T-Rex Run</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <div class="score-container">
            <span id="score-label">HI <span id="high-score">00000</span></span>
            <span id="current-score">00000</span>
        </div>
        
        <div id="game-board">
            <div id="sky">
            </div>
            <div id="dino">
                <svg viewBox="0 0 20 20" fill="currentColor">
                  <rect x="8" y="0" width="8" height="1" />
                  <rect x="8" y="1" width="1" height="1" />
                  <rect x="10" y="1" width="6" height="1" />
                  <rect x="8" y="2" width="8" height="1" />
                  <rect x="8" y="3" width="6" height="1" />
                  <rect x="8" y="4" width="8" height="1" />
                  <rect x="8" y="5" width="2" height="1" />
                  <rect x="8" y="6" width="2" height="1" />
                  <rect x="11" y="6" width="3" height="1" />
                  <rect x="0" y="7" width="1" height="1" />
                  <rect x="8" y="7" width="4" height="1" />
                  <rect x="0" y="8" width="2" height="1" />
                  <rect x="8" y="8" width="4" height="1" />
                  <rect x="0" y="9" width="3" height="1" />
                  <rect x="7" y="9" width="7" height="1" />
                  <rect x="0" y="10" width="4" height="1" />
                  <rect x="7" y="10" width="7" height="1" />
                  <rect x="0" y="11" width="5" height="1" />
                  <rect x="7" y="11" width="6" height="1" />
                  <rect x="0" y="12" width="12" height="1" />
                  <rect x="1" y="13" width="10" height="1" />
                  <rect x="2" y="14" width="8" height="1" />
                  <rect x="3" y="15" width="6" height="1" />
                  <rect x="4" y="16" width="2" height="1" />
                  <rect x="7" y="16" width="2" height="1" />
                  <rect x="4" y="17" width="2" height="1" />
                  <rect x="8" y="17" width="2" height="1" />
                  <rect x="4" y="18" width="2" height="1" />
                  <rect x="8" y="18" width="2" height="1" />
                  <rect x="3" y="19" width="3" height="1" />
                  <rect x="8" y="19" width="3" height="1" />
                </svg>
            </div>
            <div id="ground"></div>
        </div>

        <div id="start-screen" class="screen active">
            <h1>NEON RUNNER</h1>
            <p>Press Space or Tap to Jump</p>
        </div>

        <div id="game-over-screen" class="screen">
            <h2>GAME OVER</h2>
            <p>Score: <span id="final-score">0</span></p>
            <button id="restart-btn">Try Again</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
